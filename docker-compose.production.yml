version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: azheimer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: azheimer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: azheimer-backend:latest
    container_name: azheimer-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: azheimer_db
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-12345}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
